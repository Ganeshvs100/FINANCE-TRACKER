<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker | Registration Page</title>
  <link rel="stylesheet" href="register.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <h1 id="main-heading">Registration Page</h1>
  <div id="form-div">
    <form>
      <h5 id="basics">Full Name</h5>
   <input class="style" id="full_name" type="text" placeholder="Full Name" required>
      <h5 id="basics">Email Address</h5>
     <input class="style" id="email" type="email" placeholder="Email" required>
      <h5 id="basics">Password</h5>
   <input class="style" id="password" type="password" placeholder="Password" required>
      <button id="register-button" type="submit">Register</button>
      <a id="login-link" href="index.html">Already have an account? Login here</a>
    </form>
  </div>
  <script src="register.js"></script>
</body>

</html>
